<body>
<div class="page-wrapper">
    
	<!-- Preloader -->
	<div id="preloader">
		<div class="loader">

	<!-- Main Content Start -->
	<main class="page-content">
		<div class="container">
            <div class="dz-find-location">
                <div class="dz-icon icon-light">

                    <h5 class="title mb-2">What is your Location?</h5>
                    <p class="mb-0 fw-medium">Start your job search today by finding nearby positions.</p>
                </div>
                <a href="javascript:void(0);" class="btn btn-primary w-100 LocBtn" data-bs-toggle="modal" data-bs-target="#exampleModal">Allow Location Access</a>
                <a href="location.html" class="btn-link fs-4 fw-medium text-primary">Enter location Manually</a>
            </div>
        </div>
	</main>
	<!-- Main Content End -->

	<!-- Location Modal -->
	<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content rounded-1">
				<div class="modal-body">
					<p class="mb-0">Want To Acces Your Location</p>
				</div>
				<div class="modal-footer flex-nowrap">
					<button type="button" class="btn btn-sm btn-primary w-50" id="yesBtn" data-bs-dismiss="modal">Yes</button>
					<button type="button" class="btn btn-sm btn-secondary w-50" data-bs-dismiss="modal">NO</button>

			</div>
		</div>

<script>
	const yesBtn = document.getElementById('yesBtn');
	// Check if the button exists before adding the event listener
	if (yesBtn) {
		yesBtn.addEventListener('click', () => {
			window.location.href = './index.html';
		});
	}
