name: 'KAJobs'
description: "KA Jobs - Find the best job opportunities and build your career with ease."
publish_to: 'none'
version: 0.1.6

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  firebase_storage: ^12.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1976D2"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1976D2"
  image: assets/splash/splash.png
  android: true
  ios: true
  android_12:
    color: "#1976D2"
    image: assets/splash/splash.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
